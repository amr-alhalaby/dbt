version: 2

models:
  - name: dim_candidate
    description: Candidate dimension with SCD Type 2 history
    tests:
    columns:
      - name: _offset
        description: "{{ doc('offset_column') }}"
      - name: id
        description: Candidate business key
        tests:
          - not_null
      - name: primary_skill_id
        tests:
          - relationships:
              to: ref('dim_primary_skill')
              field: id
      - name: job_function_id
        tests:
          - relationships:
              to: ref('dim_job_function')
              field: id

  - name: dim_employee
    description: Employee dimension with SCD Type 2 history
    tests:
    columns:
      - name: _offset
        description: "{{ doc('offset_column') }}"
      - name: id
        description: Employee business key
        tests:
          - not_null
      - name: job_function_id
        tests:
          - relationships:
              to: ref('dim_job_function')
              field: id
      - name: primary_skill_id
        tests:
          - relationships:
              to: ref('dim_primary_skill')
              field: id

  - name: dim_primary_skill
    description: Primary skill dimension
    tests:
    columns:
      - name: id
        description: Skill business key
        tests:
          - unique
          - not_null

  - name: dim_job_function
    description: Job function dimension
    tests:
    columns:
      - name: id
        description: Job function business key
        tests:
          - unique
          - not_null

  - name: dim_date
    description: Date dimension covering 4 years (2024-2027) with weekend and holiday flags
    tests:
    columns:
      - name: date
        description: Calendar date
        tests:
          - unique
          - not_null
      - name: is_weekend
        description: "{{ doc('weekend_logic') }}"
      - name: day_of_week
        description: "Day of week number (0=Sunday, 1=Monday, ..., 6=Saturday)"

  - name: fct_interview
    description: |
      Interview fact table. Grain is one row per unique interview ID.

      {{ doc('point_in_time_joins') }}

      {{ doc('interview_status_timeline') }}

      **Key Metrics:**
      - interview_duration = in_progress to pending_feedback (online interviews only)
      - feedback_delay = pending_feedback to completed
    tests:
    columns:
      - name: id
        description: Unique interview identifier
        tests:
          - unique
          - not_null
      - name: candidate_offset
        tests:
          - relationships:
              to: ref('dim_candidate')
              field: _offset
      - name: interviewer_offset
        tests:
          - relationships:
              to: ref('dim_employee')
              field: _offset
      - name: created_date
        tests:
          - relationships:
              to: ref('dim_date')
              field: date
