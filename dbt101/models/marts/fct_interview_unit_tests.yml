  - name: test_point_in_time_join_candidate
    description: Test that point-in-time join retrieves the correct candidate version at interview creation time
    model: fct_interview
    given:
      - input: ref('stg_interviews_historical')
        rows:
          - interview_id: INT003
            candidate_id: CAND003
            interviewer_id: EMP003
            candidate_type: Applicant
            status: DRAFT
            location: IN_PERSON
            logged: false
            media_available: false
            run_type: IN_PERSON
            interview_type: Technical
            media_status: NotAvailable
            invite_answer_status: Pending
            created_at: '2024-02-15 10:00:00'
            updated_at: '2024-02-15 10:00:00'
            row_valid_from: '2024-02-15 10:00:00'
            row_valid_to: null
            row_is_active: 1
            offset: 20
      - input: ref('stg_candidates_historical')
        rows:
          # Old version - valid before interview
          - candidate_id: CAND003
            offset: 102
            primary_skill_id: SKILL_OLD
            staffing_status: Available
            english_level: B1
            job_function_id: JOB_OLD
            created_at: '2024-01-01 00:00:00'
            updated_at: '2024-01-01 00:00:00'
            row_valid_from: '2024-01-01 00:00:00'
            row_valid_to: '2024-02-10 00:00:00'
            row_is_active: 0
          # Current version - valid at interview time
          - candidate_id: CAND003
            offset: 103
            primary_skill_id: SKILL_NEW
            staffing_status: Staffed
            english_level: C1
            job_function_id: JOB_NEW
            created_at: '2024-01-01 00:00:00'
            updated_at: '2024-02-10 00:00:00'
            row_valid_from: '2024-02-10 00:00:00'
            row_valid_to: null
            row_is_active: 1
      - input: ref('stg_employees_historical')
        rows:
          - employee_id: EMP003
            offset: 202
            job_function_id: JOB005
            primary_skill_id: SKILL005
            production_category: Delivery
            employment_status: Full-time employee
            org_category: Engineering
            org_category_type: Technical
            work_start_date: '2023-01-01'
            work_end_date: null
            is_active: true
            created_at: '2023-01-01 00:00:00'
            updated_at: '2023-01-01 00:00:00'
            row_valid_from: '2023-01-01 00:00:00'
            row_valid_to: null
            row_is_active: 1
    expect:
      rows:
        - id: INT003
          candidate_offset: 103  # Should get the version valid at interview time (Feb 15), not the old one

