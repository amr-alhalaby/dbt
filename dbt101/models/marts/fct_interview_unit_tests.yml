unit_tests:
  - name: test_interview_duration_calculation
    description: Test that interview_duration is calculated correctly as time from IN_PROGRESS to PENDING_FEEDBACK
    model: fct_interview
    given:
      - input: ref('stg_interviews_historical')
        rows:
          - interview_id: INT001
            candidate_id: CAND001
            interviewer_id: EMP001
            candidate_type: Applicant
            status: DRAFT
            location: MS_TEAMS
            logged: true
            media_available: true
            run_type: ONLINE
            interview_type: Technical
            media_status: Available
            invite_answer_status: Accepted
            created_at: '2024-01-15 09:00:00'
            updated_at: '2024-01-15 09:00:00'
            row_valid_from: '2024-01-15 09:00:00'
            row_valid_to: null
            row_is_active: 1
            offset: 1
          - interview_id: INT001
            candidate_id: CAND001
            interviewer_id: EMP001
            candidate_type: Applicant
            status: IN_PROGRESS
            location: MS_TEAMS
            logged: true
            media_available: true
            run_type: ONLINE
            interview_type: Technical
            media_status: Available
            invite_answer_status: Accepted
            created_at: '2024-01-15 09:00:00'
            updated_at: '2024-01-15 10:00:00'
            row_valid_from: '2024-01-15 10:00:00'
            row_valid_to: null
            row_is_active: 1
            offset: 2
          - interview_id: INT001
            candidate_id: CAND001
            interviewer_id: EMP001
            candidate_type: Applicant
            status: PENDING_FEEDBACK
            location: MS_TEAMS
            logged: true
            media_available: true
            run_type: ONLINE
            interview_type: Technical
            media_status: Available
            invite_answer_status: Accepted
            created_at: '2024-01-15 09:00:00'
            updated_at: '2024-01-15 11:30:00'
            row_valid_from: '2024-01-15 11:30:00'
            row_valid_to: null
            row_is_active: 1
            offset: 3
      - input: ref('stg_candidates_historical')
        rows:
          - candidate_id: CAND001
            offset: 100
            primary_skill_id: SKILL001
            staffing_status: Available
            english_level: C1
            job_function_id: JOB001
            created_at: '2024-01-01 00:00:00'
            updated_at: '2024-01-01 00:00:00'
            row_valid_from: '2024-01-01 00:00:00'
            row_valid_to: null
            row_is_active: 1
      - input: ref('stg_employees_historical')
        rows:
          - employee_id: EMP001
            offset: 200
            job_function_id: JOB002
            primary_skill_id: SKILL002
            production_category: Delivery
            employment_status: Full-time employee
            org_category: Engineering
            org_category_type: Technical
            work_start_date: '2023-01-01'
            work_end_date: null
            is_active: true
            created_at: '2023-01-01 00:00:00'
            updated_at: '2023-01-01 00:00:00'
            row_valid_from: '2023-01-01 00:00:00'
            row_valid_to: null
            row_is_active: 1
    expect:
      rows:
        - id: INT001
          interview_duration: 90  # 90 minutes from 10:00 to 11:30

